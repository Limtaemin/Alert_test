name: Site Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 실행
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Monitor Sites
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import json
          import hashlib
          import re
          from datetime import datetime
          import os
          
          STATE_FILE = 'monitor_state.json'
          TELEGRAM_BOT_TOKEN = os.getenv('TELEGRAM_BOT_TOKEN')
          TELEGRAM_CHAT_ID = os.getenv('TELEGRAM_CHAT_ID')
          
          def clean_html(html):
              """조회수, 시간 등 동적 요소 제거"""
              soup = BeautifulSoup(html, 'html.parser')
              
              for script in soup(['script', 'style']):
                  script.decompose()
              
              text = soup.get_text()
              text = re.sub(r'조회수[:\s]*\d+', '', text)
              text = re.sub(r'\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}', '', text)
              text = re.sub(r'\s+', ' ', text)
              
              return text.strip()
          
          def load_state():
              try:
                  with open(STATE_FILE, 'r', encoding='utf-8') as f:
                      return json.load(f)
              except:
                  return {}
          
          def save_state(state):
              with open(STATE_FILE, 'w', encoding='utf-8') as f:
                  json.dump(state, f, ensure_ascii=False, indent=2)
          
          def send_telegram(message):
              """텔레그램으로 메시지 전송"""
              try:
                  url = f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendMessage"
                  data = {
                      'chat_id': TELEGRAM_CHAT_ID,
                      'text': message,
                      'parse_mode': 'HTML'
                  }
                  response = requests.post(url, json=data)
                  if response.status_code == 200:
                      print(f"✅ 텔레그램 전송 성공")
                  else:
                      print(f"❌ 텔레그램 전송 실패: {response.text}")
              except Exception as e:
                  print(f"❌ 오류: {str(e)}")
          
          def check_site(url, state):
              try:
                  print(f"\n🔍 확인: {url}")
                  response = requests.get(url, timeout=10)
                  response.encoding = 'utf-8'
                  current_html = response.text
                  
                  current_clean = clean_html(current_html)
                  current_hash = hashlib.md5(current_clean.encode()).hexdigest()
                  
                  previous_hash = state.get(url, {}).get('hash')
                  
                  if previous_hash == "" or previous_hash is None:
                      print(f"✅ 첫 모니터링")
                      state[url] = {
                          'hash': current_hash,
                          'last_checked': datetime.now().isoformat(),
                          'status': 'initialized'
                      }
                      return False
                  elif current_hash != previous_hash:
                      print(f"🚨 변화 감지!")
                      state[url] = {
                          'hash': current_hash,
                          'last_checked': datetime.now().isoformat(),
                          'status': 'changed'
                      }
                      return True
                  else:
                      print(f"✅ 변화 없음")
                      state[url]['last_checked'] = datetime.now().isoformat()
                      return False
              
              except Exception as e:
                  print(f"❌ 오류: {str(e)}")
                  return False
          
          # 메인 실행
          state = load_state()
          
          for url in state.keys():
              if check_site(url, state):
                  message = f"""
          🚨 <b>사이트 변화 감지!</b>
          
          <b>URL:</b> {url}
          <b>시간:</b> {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
          
          확인하러 가기: {url}
                  """
                  send_telegram(message)
          
          save_state(state)
          print("\n✅ 완료!")
          
          EOF
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add monitor_state.json
          git commit -m "Update monitor state" || true
          git push
