name: Site Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 실행
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write  # ← 이 줄 추가! (Issue 생성 권한)
      contents: write  # ← 이 줄 추가! (파일 수정 권한)
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Monitor Sites
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # ← 이 줄 추가!
        run: |
          python << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import json
          import hashlib
          import re
          from datetime import datetime
          import subprocess
          import os
          
          STATE_FILE = 'monitor_state.json'
          
          def clean_html(html):
              """조회수, 시간 등 동적 요소 제거"""
              soup = BeautifulSoup(html, 'html.parser')
              
              # 스크립트, 스타일 제거
              for script in soup(['script', 'style']):
                  script.decompose()
              
              text = soup.get_text()
              # 조회수 제거
              text = re.sub(r'조회수[:\s]*\d+', '', text)
              text = re.sub(r'\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}', '', text)
              text = re.sub(r'\s+', ' ', text)
              
              return text.strip()
          
          def load_state():
              try:
                  with open(STATE_FILE, 'r', encoding='utf-8') as f:
                      return json.load(f)
              except:
                  return {}
          
          def save_state(state):
              with open(STATE_FILE, 'w', encoding='utf-8') as f:
                  json.dump(state, f, ensure_ascii=False, indent=2)
          
          def check_site(url, state):
              try:
                  print(f"\n🔍 확인: {url}")
                  response = requests.get(url, timeout=10)
                  response.encoding = 'utf-8'
                  current_html = response.text
                  
                  current_clean = clean_html(current_html)
                  current_hash = hashlib.md5(current_clean.encode()).hexdigest()
                  
                  previous_hash = state.get(url, {}).get('hash')
                  
                  if previous_hash == "" or previous_hash is None:
                      print(f"✅ 첫 모니터링")
                      state[url] = {
                          'hash': current_hash,
                          'last_checked': datetime.now().isoformat(),
                          'status': 'initialized'
                      }
                      return False
                  elif current_hash != previous_hash:
                      print(f"🚨 변화 감지!")
                      state[url] = {
                          'hash': current_hash,
                          'last_checked': datetime.now().isoformat(),
                          'status': 'changed'
                      }
                      return True
                  else:
                      print(f"✅ 변화 없음")
                      state[url]['last_checked'] = datetime.now().isoformat()
                      return False
              
              except Exception as e:
                  print(f"❌ 오류: {str(e)}")
                  return False
          
          def create_issue(url):
              title = f"🚨 사이트 변화: {url}"
              body = f"**사이트:** {url}\n**시간:** {datetime.now().isoformat()}"
              
              try:
                  result = subprocess.run([
                      'gh', 'issue', 'create',
                      '--title', title,
                      '--body', body
                  ], capture_output=True, text=True)
                  
                  if result.returncode == 0:
                      print(f"✅ Issue 생성됨")
                  else:
                      print(f"❌ Issue 생성 실패: {result.stderr}")
              except Exception as e:
                  print(f"❌ 오류: {str(e)}")
          
          # 메인 실행
          state = load_state()
          
          for url in state.keys():
              if check_site(url, state):
                  create_issue(url)
          
          save_state(state)
          print("\n✅ 완료!")
          
          EOF
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add monitor_state.json
          git commit -m "Update monitor state" || true
          git push
